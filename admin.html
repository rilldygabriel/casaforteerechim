<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#080808"><title>Painel Casa Forte</title><link rel="stylesheet" href="casaforte.css?v=20260723-7"><link rel="stylesheet" href="admin.css?v=20260723-7"></head><body><div id="loading" class="center"><p class="sub">Verificando acesso…</p></div><section id="auth" class="center hidden"><div class="card"><div class="logo">CF</div><p class="eyebrow">Área Restrita</p><h1>Casa Forte Admin</h1><p class="sub">Entre com o e-mail autorizado da liderança.</p><div class="field"><label>E-mail</label><input id="email" class="input" type="email" autocomplete="email" autocapitalize="none"></div><div class="field"><label>Senha</label><input id="password" class="input" type="password" autocomplete="current-password"></div><button id="login" class="btn full">Entrar no painel</button><p id="loginMsg" class="msg"></p><a class="link" href="/">Voltar ao site</a></div></section><section id="denied" class="center hidden"><div class="card" style="text-align:center"><div class="logo" style="margin:auto">CF</div><h2 style="margin-top:20px">Acesso restrito</h2><p class="sub">Sua conta não possui permissão administrativa.</p><button id="deniedLogout" class="btn ghost full">Sair desta conta</button></div></section><main id="app" class="hidden"><div class="wrap"><header class="header"><div class="header-id"><div class="logo">CF</div><div><strong>Painel Casa Forte</strong><div id="adminEmail" class="sub" style="font-size:13px"></div></div></div><button id="logout" class="btn ghost small">Sair</button></header><nav class="tabs"><button class="tab active" data-panel="overview">Visão geral</button><button class="tab" data-panel="members">Membros</button><button class="tab" data-panel="visitors">Visitantes</button><button class="tab" data-panel="prayers">Pedidos de oração</button><button class="tab" data-panel="events">Eventos</button></nav><section id="overview" class="panel active"><div id="stats" class="stats"></div></section><section id="members" class="panel"><div class="toolbar"><input id="search" class="input" type="search" placeholder="Buscar por nome, e-mail ou telefone"><select id="statusFilter" class="select"><option value="">Todos os status</option><option value="visitante">Visitante</option><option value="frequentador">Frequentador</option><option value="membro">Membro</option><option value="voluntário">Voluntário</option><option value="líder">Líder</option><option value="discipulador">Discipulador</option><option value="pastor">Pastor</option></select></div><div id="membersList"><div class="empty">Carregando membros…</div></div></section><section id="visitors" class="panel"><div id="visitorsList"><div class="empty">Carregando…</div></div></section><section id="prayers" class="panel"><div id="prayersList"><div class="empty">Carregando…</div></div></section><section id="events" class="panel"><div id="eventsList"><div class="empty">Carregando…</div></div></section></div></main><div id="memberModal" class="modal"><div class="modal-box"><div class="modal-head"><h2 id="modalTitle">Editar membro</h2><button id="closeModal" class="close">×</button></div><div class="field"><label>Nome completo</label><input id="mName" class="input"></div><div class="row"><div class="field"><label>WhatsApp</label><input id="mPhone" class="input"></div><div class="field"><label>Instagram</label><input id="mInstagram" class="input"></div></div><div class="row"><div class="field"><label>Nascimento</label><input id="mBirth" class="input" type="date"></div><div class="field"><label>Aceitou Jesus em</label><input id="mYear" class="input" type="number"></div></div><div class="row"><div class="field"><label>Veio de outro ministério</label><select id="mPrevious" class="select"><option value="">Não informado</option><option value="true">Sim</option><option value="false">Não</option></select></div><div class="f
